<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Debug Audio</title>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            background: #111; 
            color: white;
            font-family: sans-serif;
        }
        button { 
            padding: 50px; 
            font-size: 24px; 
            font-weight: bold;
            background: #007AFF;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        #status {
            margin-top: 20px;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <button id="btn">TAP POUR TESTER LE SON</button>
    <div id="status">Statut : En attente...</div>

<script>
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    let audioCtx = null;
    let tickBuffer = null;

    // 1. Préchargement immédiat
    async function init() {
        status.innerText = "Chargement du fichier...";
        try {
            const response = await fetch('tick1.wav');
            if (!response.ok) throw new Error("Fichier tick1.wav introuvable (404)");
            
            const arrayBuffer = await response.arrayBuffer();
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            tickBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            
            status.innerHTML = "<span style='color:green'>SON PRÊT ET DÉCODÉ</span>";
        } catch (e) {
            status.innerHTML = "<span style='color:red'>ERREUR : " + e.message + "</span>";
        }
    }

    // 2. Lecture au clic
    btn.addEventListener('click', () => {
        if (!audioCtx || !tickBuffer) {
            status.innerText = "Erreur : Son non chargé";
            return;
        }

        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const source = audioCtx.createBufferSource();
        source.buffer = tickBuffer;
        source.connect(audioCtx.destination);
        source.start(0);
        
        status.innerText = "Lecture déclenchée à " + new Date().toLocaleTimeString();
    });

    init();
</script>
</body>
</html>
