<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Debug Audio Loop</title>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            background: #111; 
            color: white;
            font-family: sans-serif;
            -webkit-user-select: none;
            gap: 20px;
        }
        button { 
            width: 80%;
            padding: 30px; 
            font-size: 18px; 
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            text-transform: uppercase;
        }
        #btn-simple { background: #007AFF; }
        #btn-loop { background: #FF3B30; }
        
        button:active { opacity: 0.8; transform: scale(0.98); }
        #status { font-size: 14px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <button id="btn-simple">Clic Unique</button>
    <button id="btn-loop">Appui Long (Boucle 200ms)</button>
    
    <div id="status">Chargement...</div>

<script>
    const btnSimple = document.getElementById('btn-simple');
    const btnLoop = document.getElementById('btn-loop');
    const status = document.getElementById('status');
    
    let audioCtx = null;
    let tickBuffer = null;
    let loopTimer = null;

    async function init() {
        try {
            const response = await fetch('tick1.wav');
            const arrayBuffer = await response.arrayBuffer();
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            tickBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            status.innerHTML = "<span style='color:green'>SON PRÊT</span>";
        } catch (e) {
            status.innerHTML = "<span style='color:red'>ERREUR : " + e.message + "</span>";
        }
    }

    function playTick() {
        if (!audioCtx || !tickBuffer) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const source = audioCtx.createBufferSource();
        source.buffer = tickBuffer;
        source.connect(audioCtx.destination);
        source.start(0);
    }

    // BOUTON SIMPLE
    btnSimple.addEventListener('click', playTick);

    // BOUTON BOUCLE (Gestion Mobile)
    btnLoop.addEventListener('touchstart', (e) => {
        e.preventDefault();
        playTick(); // Premier son immédiat
        
        // Lancement de la boucle
        clearInterval(loopTimer);
        loopTimer = setInterval(playTick, 200);
        
        status.innerText = "BOUCLE EN COURS...";
        btnLoop.style.background = "#8B0000";
    });

    btnLoop.addEventListener('touchend', () => {
        clearInterval(loopTimer);
        status.innerText = "BOUCLE ARRÊTÉE";
        btnLoop.style.background = "#FF3B30";
    });

    // Sécurité si le doigt sort du bouton
    btnLoop.addEventListener('touchcancel', () => {
        clearInterval(loopTimer);
    });

    init();
</script>
</body>
</html>
